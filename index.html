<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Максим & Ангелина</title>

<link href="https://fonts.cdnfonts.com/css/complex" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Complex',serif;
background:#f5f1ee;
text-align:center;
color:#2b2b2b;
}

section{
padding:80px 20px;
}

h1{
font-size:50px;
margin:0;
}

h2{
font-size:34px;
margin-bottom:20px;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:#000;
color:white;
}

.photo{
max-width:800px;
margin:auto;
}

.photo img{
width:100%;
border-radius:12px;
}

.name{
font-size:38px;
margin-top:20px;
}

.timer{
font-size:28px;
margin-top:20px;
}

.map iframe{
border-radius:12px;
}

form{
max-width:420px;
margin:auto;
display:flex;
flex-direction:column;
gap:12px;
}

input,select,button{
padding:12px;
font-family:'Complex',serif;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#2b2b2b;
color:white;
cursor:pointer;
}

footer{
padding:40px;
background:#eee;
}

@media(max-width:600px){

h1{font-size:34px}
h2{font-size:26px}

}

</style>
</head>

<body>

<!-- Детское фото Максима -->

<section>

<div class="photo">

<img src="maxim-child.jpg">

<div class="name">Максимка</div>

</div>

</section>

<!-- Детское фото Ангелины -->

<section>

<div class="photo">

<img src="angelina-child.jpg">

<div class="name">Ангелинка</div>

</div>

</section>

<!-- Фото пары -->

<section>

<div class="photo">

<img src="couple.jpg">

</div>

</section>

<!-- Приглашение -->

<section>

<h2>Дорогие родные и друзья</h2>

<p>

Мы рады сообщить вам, что  
<strong>26 июня 2026</strong>  
состоится самый важный день в нашей жизни —  
<strong>день нашей свадьбы.</strong>

</p>

<p>

Будем счастливы разделить этот день вместе с вами.

</p>

</section>

<!-- Таймер -->

<section>

<h2>До свадьбы осталось</h2>

<div class="timer" id="timer"></div>

</section>

<!-- Карта -->

<section>

<h2>Место проведения</h2>

<div class="map">

<iframe
src="https://maps.google.com/maps?q=54.696771,53.769545&z=15&output=embed"
width="100%"
height="320">
</iframe>

</div>

</section>

<!-- RSVP -->

<section>

<h2>Подтвердите присутствие</h2>

<form id="rsvpForm">

<input type="text" name="name" placeholder="Ваше имя" required>

<select name="attendance" required>

<option value="">Выберите вариант</option>
<option>Приду</option>
<option>К сожалению не смогу</option>

</select>

<select name="plusone">

<option value="">Будете с половинкой?</option>
<option>Да</option>
<option>Нет</option>

</select>

<button type="submit">Отправить</button>

</form>

<p id="formStatus"></p>

</section>

<footer>

Максим ❤ Ангелина  
26.06.2026

</footer>

<audio autoplay loop>

<source src="Highway_to_Hell.mp3" type="audio/mpeg">

</audio>

<script>

const weddingDate=new Date("2026-06-26T16:00:00").getTime();
const timer=document.getElementById("timer");

setInterval(()=>{

const now=new Date().getTime();
const distance=weddingDate-now;

const days=Math.floor(distance/(1000*60*60*24));
const hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60));
const minutes=Math.floor((distance%(1000*60*60))/(1000*60));

timer.innerHTML=days+" дней "+hours+" часов "+minutes+" минут";

},1000);


// Google Sheets

const scriptURL="https://script.google.com/macros/s/AKfycbwL4eRQd-dCRjgfkLAFleBJHLJxxqFmQWxZY0Pc6oWdiGFLiOB3LwtrnDWIUh6WkhqD/exec";
const form=document.getElementById('rsvpForm');

form.addEventListener('submit',e=>{

e.preventDefault();
const formData=new FormData(form);

fetch(scriptURL,{method:'POST',body:formData})
.then(()=>{
document.getElementById('formStatus').innerText="Спасибо! Ответ отправлен";
form.reset();
})
.catch(()=>{
document.getElementById('formStatus').innerText="Ошибка отправки";
});

});

</script>

</body>
</html>
